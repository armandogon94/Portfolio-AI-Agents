services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  agents-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-api
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      EMBEDDING_MODE: local
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      API_KEY: ${API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://agents.305-ai.com}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agents.rule=Host(`agents.305-ai.com`)"
      - "traefik.http.routers.agents.entrypoints=websecure"
      - "traefik.http.routers.agents.tls.certresolver=letsencrypt"
      - "traefik.http.services.agents.loadbalancer.server.port=8000"

  chainlit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainlit-ui
    depends_on:
      agents-api:
        condition: service_healthy
    environment:
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      EMBEDDING_MODE: local
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    command: ["chainlit", "run", "src/chainlit_app.py", "--host", "0.0.0.0", "--port", "3060"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3060')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  qdrant_data:

networks:
  backend:
  frontend:
