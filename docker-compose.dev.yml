services:
  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI agents application
  agents-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-api-dev
    ports:
      - "8060:8000"
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_MODE: local
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      APP_PORT: 8000
    volumes:
      - ./src:/app/src
      - ./knowledge:/app/knowledge
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Chainlit chat UI
  chainlit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainlit-dev
    ports:
      - "3060:3060"
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_MODE: local
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    command: ["chainlit", "run", "src/chainlit_app.py", "--host", "0.0.0.0", "--port", "3060"]
    volumes:
      - ./src:/app/src
      - ./knowledge:/app/knowledge
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  qdrant_data:
