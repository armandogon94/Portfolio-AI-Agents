services:
  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI agents application
  agents-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-api-dev
    ports:
      - "8060:8000"
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_MODE: local
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      APP_PORT: 8000
    volumes:
      - ./src:/app/src
      - ./knowledge:/app/knowledge
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Chainlit chat UI
  chainlit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainlit-dev
    ports:
      - "3060:3060"
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_MODE: local
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: documents
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    command: ["chainlit", "run", "src/chainlit_app.py", "--host", "0.0.0.0", "--port", "3060"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3060')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - ./src:/app/src
      - ./knowledge:/app/knowledge
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Next.js 14+ team-view dashboard (slice-20a, DEC-26)
  dashboard:
    image: node:20-alpine
    container_name: dashboard-dev
    working_dir: /app
    ports:
      - "3061:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8060
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    command: sh -c "npm ci --prefer-offline --no-audit && npm run dev -- --hostname 0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    depends_on:
      agents-api:
        condition: service_started
    restart: unless-stopped

volumes:
  qdrant_data:
  dashboard_node_modules:
