research:
  description: >
    Research the following topic thoroughly: {topic}

    {prior_context}

    Gather information from web searches and internal documents.
    Include relevant data, statistics, and expert opinions.
    Note the sources of your information.
  agent: researcher
  expected_output: >
    A comprehensive research summary with key findings, supporting
    data points, and source references.

analysis:
  description: >
    Analyze the research findings and extract key insights.

    Identify patterns, trends, and significant data points.
    Compare different perspectives and highlight areas of consensus
    and disagreement. Provide data-driven conclusions.
  agent: analyst
  expected_output: >
    Structured analysis with key patterns, trends, actionable insights,
    and data-driven conclusions.

writing:
  description: >
    Create a professional report based on the research and analysis.

    Structure the content with clear sections, use engaging language,
    and ensure the report is accessible to the target audience.
    Include an executive summary and recommendations.
  agent: writer
  expected_output: >
    Well-structured written report with executive summary, detailed
    findings, analysis, and clear recommendations.

validation:
  description: >
    Review the complete report for quality assurance.

    Check for factual accuracy, logical consistency, completeness,
    grammar, and overall quality. Provide specific feedback and
    corrections where needed.
  agent: validator
  expected_output: >
    Quality assessment with specific corrections, improvement
    suggestions, and a final quality score (1-10).

# --- Slice 23: Sales pack ---

lead_research:
  description: >
    Research the prospect company/lead: {topic}

    {prior_context}

    Gather public signals (employee count, funding stage, tech stack,
    recent news, leadership profile). Prefer primary sources. Include
    citations as URLs in your notes.
  agent: researcher
  expected_output: >
    A bulleted research dossier with explicit fields: company_name,
    employee_count, funding_stage, tech_stack, recent_news, leadership,
    and a "sources" list of URLs.

lead_scoring:
  description: >
    Score the prospect against the ICP rubric using the research dossier.

    Rubric criteria and weights are FIXED and provided by the workflow.
    For each criterion, emit a 0-10 sub-score with a one-line
    evidence citation. Compute the weighted total as a 0-100 number.
    Do not invent criteria and do not weight differently.
  agent: scorer
  expected_output: >
    JSON object with keys: score (0-100), criteria (list of
    {criterion, sub_score_0_10, weight, evidence}), reasoning,
    recommended_next_action.

lead_report:
  description: >
    Write a one-page sales brief from the scored lead.

    Structure: Executive summary (3 sentences), Why they fit, Why they
    might not, Recommended next action, Evidence links.
  agent: report_writer
  expected_output: >
    A markdown brief following the structure above, under 400 words.

persona_research:
  description: >
    Research the persona described by the target: {topic}

    {prior_context}

    Produce a persona sketch with goals, top 3 pains, likely
    objections, and 2 concrete hooks (recent event, shared interest,
    tech stack match) an SDR could use. Cite sources.
  agent: persona_researcher
  expected_output: >
    Markdown persona sketch with the sections Goals, Pains, Objections,
    Hooks, Sources.

draft_formal:
  description: >
    Using the persona sketch, draft a FORMAL outbound email.

    Constraints: 90-120 words, professional greeting, single CTA,
    no emojis, no exclamation marks. Use the persona's hooks.
  agent: copywriter_formal
  expected_output: >
    The full email as markdown with a subject line followed by the body.

draft_casual:
  description: >
    Using the persona sketch, draft a CASUAL outbound email.

    Constraints: 60-90 words, peer-to-peer tone, contractions allowed,
    ask one specific question. No emojis.
  agent: copywriter_casual
  expected_output: >
    The full email as markdown with a subject line followed by the body.

draft_provocative:
  description: >
    Using the persona sketch, draft a PROVOCATIVE outbound email.

    Constraints: 50-80 words, lead with a non-consensus observation
    about the prospect's industry, end with a "disagree?" style CTA.
    Polite, never insulting.
  agent: copywriter_provocative
  expected_output: >
    The full email as markdown with a subject line followed by the body.

tone_check:
  description: >
    Compare the three drafts (formal, casual, provocative) and pick
    the best variant for this persona. Rate each on clarity, persona
    fit, CTA strength, and reply-likelihood (0-10 each). Name the
    winner and give a one-line justification per variant.
  agent: tone_checker
  expected_output: >
    JSON with keys: picked_variant (one of formal|casual|provocative),
    ratings (map of variant -> per-axis scores), justification (per
    variant), recommended_subject_line.

# --- Slice 24: Support & Ops pack ---

triage_route:
  description: >
    Inbound ticket: {topic}

    {prior_context}

    As the triage manager, delegate subtasks to your specialists,
    then stitch their findings into a unified response plan. Do not
    answer the ticket yourself — that's the response_writer's job.
  agent: triage_manager
  expected_output: >
    JSON with keys: category (bug|question|feature_request|billing|
    other), urgency (low|medium|high|critical), suggested_response
    (final customer-facing reply), kb_sources (list of doc IDs).

kb_search:
  description: >
    Search the internal knowledge base for docs relevant to this
    ticket. Return the top 3 matches with snippet + doc ID + confidence.
  agent: kb_searcher
  expected_output: >
    Bulleted list of up to 3 entries, each with: doc_id, snippet
    (<=200 chars), confidence (0-1). If no good matches, return an
    empty list and a one-line reason.

sentiment_analyze:
  description: >
    Classify the ticket's urgency and emotion. Flag escalation signals.
  agent: sentiment_analyst
  expected_output: >
    JSON with urgency (low|medium|high|critical), emotion
    (frustrated|confused|neutral|angry|happy), escalation_flags
    (list), and a 1-sentence rationale.

response_draft:
  description: >
    Using the KB snippets and sentiment signal, draft the customer
    reply. Cite doc IDs inline; propose concrete next steps; do not
    promise unshipped features.
  agent: response_writer
  expected_output: >
    A markdown reply ready to send, under 200 words.

attendee_research:
  description: >
    Research each attendee listed in: {topic}

    Return a one-line bio + one recent public-signal fact per person
    (post, news item, hire, product launch within 90 days).
  agent: attendee_researcher
  expected_output: >
    JSON list of {name, title, org, bio, recent_signal, source_url}.

topic_research:
  description: >
    Summarize the meeting topic from: {topic}

    {prior_context}

    Pull recent news, internal docs, and industry context. Surface
    up to 3 contested angles worth addressing. End with 3 must-cover
    questions.
  agent: topic_researcher
  expected_output: >
    JSON with keys: summary (1 paragraph), contested_angles (list),
    must_cover_questions (list of 3), sources (URLs).

build_agenda:
  description: >
    Using the attendee briefs and topic summary, produce a time-boxed
    meeting agenda. Assume 30 minutes unless the topic specifies
    otherwise. Put must-cover questions first.
  agent: agenda_writer
  expected_output: >
    Markdown agenda with numbered items, each with a time allocation
    and owner (where implied by the topic).

build_talking_points:
  description: >
    Turn each agenda item into 2-3 bullet talking points the chair
    can read on screen. No jargon, no hedge words.
  agent: talking_points_writer
  expected_output: >
    Markdown list: agenda item headers each followed by 2-3 bullets.
